name: Release

# Trigger: push a version tag  →  git tag v1.0.0 && git push origin v1.0.0
on:
  push:
    tags:
      - 'v*'

jobs:
  # ── Create the draft release ───────────────────────────────────────────────
  create-release:
    name: Create Release
    runs-on: ubuntu-latest
    outputs:
      release_id: ${{ steps.create.outputs.result }}
    steps:
      - uses: actions/checkout@v4

      - name: Create draft GitHub release
        id: create
        uses: actions/github-script@v7
        with:
          script: |
            const tag = context.ref.replace('refs/tags/', '');
            const { data } = await github.rest.repos.createRelease({
              owner: context.repo.owner,
              repo: context.repo.repo,
              tag_name: tag,
              name: `Stockfolio ${tag}`,
              body: `## Stockfolio ${tag}\n\n` +
                `### Windows\n` +
                `- **Stockfolio_${tag.replace('v','')}_x64-setup.exe** — NSIS installer (recommended)\n` +
                `- **Stockfolio_${tag.replace('v','')}_x64_en-US.msi** — MSI installer\n\n` +
                `### macOS (unsigned)\n` +
                `- **Stockfolio_${tag.replace('v','')}_universal.dmg** — Universal disk image (Apple Silicon + Intel)\n\n` +
                `> **First launch:** Right-click the app → **Open**, then click **Open** in the dialog.\n` +
                `> Or run in Terminal: \`xattr -cr /Applications/Stockfolio.app\`\n\n` +
                `### Linux\n` +
                `- **stockfolio_${tag.replace('v','')}_amd64.deb** — Debian/Ubuntu package\n` +
                `- **stockfolio-${tag.replace('v','')}-1.x86_64.rpm** — Red Hat/Fedora package\n` +
                `- **stockfolio_${tag.replace('v','')}_amd64.AppImage** — Portable app (any distro)\n\n` +
                `> See the full changelog in [CHANGELOG.md](https://github.com/${context.repo.owner}/${context.repo.repo}/blob/main/CHANGELOG.md).`,
              draft: true,
              prerelease: false
            });
            return data.id;
          result-encoding: string

  # ── Windows build ──────────────────────────────────────────────────────────
  build-windows:
    name: Windows
    needs: create-release
    runs-on: windows-latest
    steps:
      - uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      - name: Setup Rust stable
        uses: dtolnay/rust-toolchain@stable

      - name: Rust cache
        uses: swatinem/rust-cache@v2
        with:
          workspaces: src-tauri

      - name: Install JS dependencies
        run: npm ci

      - name: Tauri build (Windows)
        uses: tauri-apps/tauri-action@v0
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        with:
          releaseId: ${{ needs.create-release.outputs.release_id }}
          includeUpdaterJson: false

  # ── macOS build (unsigned) ─────────────────────────────────────────────────
  # App is unsigned — users must right-click → Open on first launch,
  # or run: xattr -cr /Applications/Stockfolio.app
  build-macos:
    name: macOS
    needs: create-release
    runs-on: macos-latest
    steps:
      - uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      - name: Setup Rust stable + Apple targets
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: aarch64-apple-darwin,x86_64-apple-darwin

      - name: Rust cache
        uses: swatinem/rust-cache@v2
        with:
          workspaces: src-tauri

      - name: Install JS dependencies
        run: npm ci

      - name: Tauri build (macOS — universal binary, unsigned)
        uses: tauri-apps/tauri-action@v0
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          TAURI_SKIP_DEVSERVER_CHECK: true
        with:
          releaseId: ${{ needs.create-release.outputs.release_id }}
          includeUpdaterJson: false
          args: --target universal-apple-darwin

  # ── Linux build ────────────────────────────────────────────────────────────
  build-linux:
    name: Linux
    needs: create-release
    runs-on: ubuntu-22.04
    steps:
      - uses: actions/checkout@v4

      - name: Install Linux system dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y \
            libwebkit2gtk-4.1-dev \
            libappindicator3-dev \
            librsvg2-dev \
            patchelf

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      - name: Setup Rust stable
        uses: dtolnay/rust-toolchain@stable

      - name: Rust cache
        uses: swatinem/rust-cache@v2
        with:
          workspaces: src-tauri

      - name: Install JS dependencies
        run: npm ci

      - name: Tauri build (Linux)
        uses: tauri-apps/tauri-action@v0
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          APPIMAGE_EXTRACT_AND_RUN: 1
          NO_STRIP: 1
        with:
          releaseId: ${{ needs.create-release.outputs.release_id }}
          includeUpdaterJson: false
